<!DOCTYPE html>
<html>
<head>
    <title>Бюджет</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .form-group { margin: 10px 0; }
        input, select, button { padding: 8px; margin: 5px; }
        .balance { font-size: 24px; font-weight: bold; color: green; }
        .income { color: green; }
        .expense { color: red; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f5f5f5; }
    </style>
</head>
<body>
    <h1>Семейный бюджет</h1>
    
    <div class="card">
        <h2>Баланс: <span id="balance" class="balance">0 ₽</span></h2>
    </div>

    <div class="card">
        <h3>Добавить транзакцию</h3>
        <div class="form-group">
            <select id="type">
                <option value="expense">Расход</option>
                <option value="income">Доход</option>
            </select>
            <input type="number" id="amount" placeholder="Сумма">
            <input type="text" id="category" placeholder="Категория">
            <input type="text" id="description" placeholder="Описание">
            <input type="date" id="date">
            <button onclick="addTransaction()">Добавить</button>
        </div>
    </div>

    <div class="card">
        <h3>Транзакции</h3>
        <table>
            <thead>
                <tr><th>Дата</th><th>Тип</th><th>Категория</th><th>Сумма</th><th>Описание</th></tr>
            </thead>
            <tbody id="transactions"></tbody>
        </table>
    </div>

    <script>
        function loadBalance() {
            fetch('/api/balance').then(r => r.json()).then(data => {
                document.getElementById('balance').textContent = data.balance.toFixed(2) + ' ₽';
            });
        }

        function loadTransactions() {
            fetch('/api/transactions').then(r => r.json()).then(data => {
                const tbody = document.getElementById('transactions');
                tbody.innerHTML = '';
                data.transactions.forEach(t => {
                    const row = tbody.insertRow();
                    row.innerHTML = `<td>${t[5]}</td><td class="${t[2]}">${t[2]}</td><td>${t[3]}</td><td class="${t[2]}">${t[1]} ₽</td><td>${t[4]}</td>`;
                });
            });
        }

        function addTransaction() {
            const data = {
                amount: parseFloat(document.getElementById('amount').value),
                type: document.getElementById('type').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                date: document.getElementById('date').value || new Date().toISOString().split('T')[0]
            };
            
            fetch('/api/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).then(() => {
                loadBalance();
                loadTransactions();
                document.getElementById('amount').value = '';
                document.getElementById('category').value = '';
                document.getElementById('description').value = '';
            });
        }

        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        loadBalance();
        loadTransactions();
    </script>
</body>
</html>
